spring.application.name=ms-usuarios
server.port=8081

# Conexion a PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_usuarios}
spring.datasource.username=postgres
spring.datasource.password=adminpassword123

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Enlace al contenedor del broker de RabbitMQ para el emisor
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ? ACTIVAR EL INICIALIZADOR EN MODO UPDATE
spring.sql.init.mode=always
spring.sql.init.separator=//
spring.jpa.defer-datasource-initialization=true