spring.application.name=ms-donaciones
server.port=8091

# Control transaccional de recaudacion de fondos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_donaciones}
spring.datasource.username=postgres
spring.datasource.password=adminpassword123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Permite que el script corra de forma tardia
spring.jpa.defer-datasource-initialization=true