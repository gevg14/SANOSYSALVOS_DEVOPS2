server:
  port: 8082

spring:
  application:
    name: ms-registro-mascotas
  datasource:
    url: jdbc:h2:mem:mascotasdb
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/