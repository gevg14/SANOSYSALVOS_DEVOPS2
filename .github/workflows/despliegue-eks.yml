name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main  # O la rama por defecto que tengas en tu repositorio

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: innovatech-frontend
  EKS_CLUSTER_NAME: eks-cluster
  # 🆔 Tu ID de cuenta recuperado de la consola AWS Academy
  AWS_ACCOUNT_ID: "180265720053" 

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔐 SOLUCIÓN ACADEMY LABS: Login directo via CLI sin usar la acción bloqueada
      - name: Login to Amazon ECR via AWS CLI
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build, Tag, and Push Image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Compilar usando la carpeta interna ./frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Reemplaza la etiqueta de la imagen dinámicamente en tu archivo front.yml
          sed -i "s|\${IMAGE_TAG}|$IMAGE_TAG|g" front.yml
          kubectl apply -f front.yml
